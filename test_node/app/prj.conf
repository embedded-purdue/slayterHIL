# Console
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_NANOPB=y
CONFIG_SPI_STM32_INTERRUPT=y

# Logging — immediate mode so output appears even before threads start
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

# GPIO (for LED)
CONFIG_GPIO=y

# SPI — both lines required or the device object is never emitted
CONFIG_SPI=y
CONFIG_SPI_SLAVE=y
CONFIG_SPI_LOG_LEVEL_OFF=y

# I2C
CONFIG_I2C=y
CONFIG_I2C_TARGET=y

# Kernel
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_THREAD_NAME=y
CONFIG_STACK_SENTINEL=y

# Skip clock sync handshake during bring-up (no Pi connected yet)
# CONFIG_HIL_SKIP_CLOCK_SYNC=y
